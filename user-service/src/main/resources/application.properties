spring.application.name=user-service
server.port=8082

# Datasource - full URL with required params
spring.datasource.url=jdbc:mysql://mysql:3306/twitter_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# MySQL8Dialect replaces deprecated MySQLDialect in Hibernate 6
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
# Defer initialization so datasource is fully ready before Hibernate runs
spring.jpa.defer-datasource-initialization=true

# Eureka
eureka.client.service-url.defaultZone=http://service-registry:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# Docs
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Logging
logging.level.com.twitter.userservice=DEBUG
logging.level.org.springframework.web=INFO